name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: auction_db
        ports:
          - 3306:3306
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test with Maven
        run: mvn test -pl services/user-service -am

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Repository Name to Lowercase
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and Push Business Services
        if: github.event_name != 'pull_request'
        run: |
          services=("user-service" "catalog-service" "core-service")
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t ghcr.io/${{ env.REPO_LOWER }}/$service:latest ./services/$service
            docker push ghcr.io/${{ env.REPO_LOWER }}/$service:latest
          done

      - name: Build and Push Infrastructure Services
        if: github.event_name != 'pull_request'
        run: |
          infra_services=("eureka-server" "api-gateway" "config-server")
          for service in "${infra_services[@]}"; do
            echo "Building $service..."
            docker build -t ghcr.io/${{ env.REPO_LOWER }}/$service:latest ./infrastructure/$service
            docker push ghcr.io/${{ env.REPO_LOWER }}/$service:latest
          done
