spring.application.name=user-service-test
spring.config.import=
spring.cloud.config.enabled=false
eureka.client.enabled=false

keycloak.server-url=http://localhost:8080/auth
keycloak.realm=test
keycloak.admin-client-id=admin
keycloak.public-client-id=public
keycloak.client-secret=secret

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/test

spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect