server.port=8100
# Port
keycloak.server-url=${KEYCLOAK_SERVER_URL}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID}
keycloak.public-client-id=${KEYCLOAK_PUBLIC_CLIENT_ID}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_OAUTH2_ISSUER_URI}



# DB
spring.datasource.url=${USER_SERVICE_DATASOURCE_URL}
spring.datasource.username=${USER_SERVICE_DB_USER}
spring.datasource.password=${USER_SERVICE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

