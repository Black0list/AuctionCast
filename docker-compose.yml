version: '3.8'

services:
  config-server:
    build: ./infrastructure/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./infrastructure/config-repo:/app/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_FILE: file:/app/config-repo
      EUREKA_SERVER: http://eureka-server:8761/eureka/
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  eureka-server:
    build: ./infrastructure/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-gateway:
    build: ./infrastructure/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_SERVICE: http://eureka-server:8761/eureka/
      # Gateway needs to know where Keycloak is for validating tokens
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/bidly-realm
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: bidly-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8180:8080"
    networks:
      - bidly-network

  user-service_db:
    image: postgres:15
    container_name: user-service_db
    environment:
      POSTGRES_USER: bidly_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user-service_db
    ports:
      - "5433:5432"
    networks:
      - bidly-network

  catalog-service_db:
    image: postgres:15
    container_name: catalog-service_db
    environment:
      POSTGRES_USER: bidly_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog-service_db
    ports:
      - "5434:5432"
    networks:
      - bidly-network

  redis:
    image: redis:7-alpine
    container_name: bidly-redis
    ports:
      - "6379:6379"
    networks:
      - bidly-network

networks:
  bidly-network:
    driver: bridge