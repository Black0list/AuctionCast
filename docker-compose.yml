version: '3.8'

services:
  config-server:
    build: ./infrastructure/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./infrastructure/config-repo:/app/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_FILE: file:/app/config-repo
      EUREKA_SERVER: http://eureka-server:8761/eureka/
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  eureka-server:
    build: ./infrastructure/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-gateway:
    build: ./infrastructure/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_SERVICE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/bidly-realm
    networks:
      - bidly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./uploads:/app/uploads

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: bidly-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8180:8080"
    networks:
      - bidly-network

  user-service_db:
    image: postgres:15
    container_name: user-service_db
    environment:
      POSTGRES_USER: bidly_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user-service_db
    ports:
      - "5433:5432"
    networks:
      - bidly-network

  catalog-service_db:
    image: postgres:15
    container_name: catalog-service_db
    environment:
      POSTGRES_USER: bidly_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog-service_db
    ports:
      - "5434:5432"
    networks:
      - bidly-network

  core-service_db:
    image: postgres:15
    container_name: core-service_db
    environment:
      POSTGRES_USER: bidly_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core-service_db
    ports:
      - "5435:5432"
    networks:
      - bidly-network

  redis:
    image: redis:7-alpine
    container_name: bidly-redis
    ports:
      - "6379:6379"
    networks:
      - bidly-network

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8100:8100"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service_db:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_SERVICE: http://eureka-server:8761/eureka/
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_PUBLIC_CLIENT_ID: ${KEYCLOAK_PUBLIC_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_OAUTH2_ISSUER_URI: ${KEYCLOAK_OAUTH2_ISSUER_URI}
      USER_SERVICE_DATASOURCE_URL: ${USER_SERVICE_DATASOURCE_URL}
      USER_SERVICE_DB_USER: ${DB_USER}
      USER_SERVICE_DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - bidly-network

  catalog-service:
    build: ./services/catalog-service
    container_name: catalog-service
    ports:
      - "8200:8200"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      catalog-service_db:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_SERVICE: http://eureka-server:8761/eureka/
      CATALOG_SERVICE_DATASOURCE_URL: ${CATALOG_SERVICE_DATASOURCE_URL}
      CATALOG_SERVICE_DB_USER: ${DB_USER}
      CATALOG_SERVICE_DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - bidly-network

  core-service:
    build: ./services/core-service
    container_name: core-service
    ports:
      - "8300:8300"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      core-service_db:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_SERVICE: http://eureka-server:8761/eureka/
      CORE_SERVICE_DATASOURCE_URL: ${CORE_SERVICE_DATASOURCE_URL}
      CORE_SERVICE_DB_USER: ${DB_USER}
      CORE_SERVICE_DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - bidly-network

  frontend:
    build: ../AuctionX - Angular
    container_name: bidly-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - bidly-network

networks:
  bidly-network:
    driver: bridge

